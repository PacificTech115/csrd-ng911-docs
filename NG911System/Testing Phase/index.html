<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRD NG911 — Live Automated Testing Report</title>
  <meta name="description" content="Automated live testing report for the CSRD NG911 Central Database System">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── PROGRESS BAR ── -->
  <div id="progress-bar" style="width:0%"></div>

  <!-- ── HEADER ── -->
  <header class="report-header">
    <h1>CSRD <span>NG9-1-1</span> Central Database</h1>
    <div class="subtitle">Live Automated Testing Report</div>
    <div class="prepared-by">
      <i class="fas fa-building"></i> Prepared by Pacific Tech Systems &nbsp;·&nbsp;
      <i class="fas fa-calendar"></i> <span id="report-date"></span>
    </div>
  </header>

  <!-- ── STATS OVERVIEW ── -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-num total" id="stat-total">0</span>
      <div class="stat-label">Total Tests</div>
    </div>
    <div class="stat-card">
      <span class="stat-num passed" id="stat-passed">0</span>
      <div class="stat-label">Passed</div>
    </div>
    <div class="stat-card">
      <span class="stat-num failed" id="stat-failed">0</span>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-card">
      <span class="stat-num pending" id="stat-pending">0</span>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn" onclick="expandAll()"><i class="fas fa-chevron-down"></i> Expand All</button>
      <button class="btn" onclick="collapseAll()"><i class="fas fa-chevron-up"></i> Collapse</button>
    </div>
    <div class="toolbar-right">
      <button class="btn" onclick="importJSON()"><i class="fas fa-file-import"></i> Import</button>
      <button class="btn btn-primary" onclick="exportJSON()"><i class="fas fa-file-export"></i> Export Results</button>
      <button class="btn btn-danger" onclick="resetAll()"><i class="fas fa-trash-can"></i> Reset</button>
    </div>
  </div>

  <!-- ── PHASES ── -->
  <div class="content-wrap">
    <div id="phases-container"></div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="report-footer">
    CSRD NG911 Live Automated Testing Report &copy; 2026 &middot; Pacific Tech Systems
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById('report-date').textContent = new Date().toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric' });
  </script>
</body>
</html>
