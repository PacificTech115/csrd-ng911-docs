<!-- ═══ PAGE HEADER ═══ -->
<header class="page-header">
  <div class="page-header-content">
    <nav class="breadcrumb">
      <a href="#Documentation">Home</a>
      <i class="fas fa-chevron-right sep"></i>
      <span>Technical Documentation</span>
      <i class="fas fa-chevron-right sep"></i>
      <span class="current">Automations Dashboard</span>
    </nav>
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div>
        <h1><span>Automations</span> Dashboard</h1>
        <div class="subtitle">Live System Operational Status</div>
      </div>
      <button id="refresh-dashboard" class="btn primary" style="padding: 10px 20px; border-radius: 8px; border: none; background: var(--teal); color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600;">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>
  </div>
</header>

<div class="content-wrap">
  <section>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-top: 16px;">
      
      <!-- Card 1: Nightly Orchestrator -->
      <div class="card reveal" style="padding: 24px;">
        <div class="card-header" style="margin-bottom: 20px;">
          <div class="card-icon teal"><i class="fas fa-moon"></i></div>
          <h4 style="font-size: 1.25rem;">Nightly Pipeline Tracker</h4>
        </div>
        
        <div id="nightly-status-chip" style="display: inline-block; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; margin-bottom: 16px; background: rgba(148, 163, 184, 0.1); color: var(--text-secondary);">
          <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>

        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px;">
          <div><i class="fas fa-calendar-alt" style="width: 20px;"></i> <strong>Started:</strong> <span id="nightly-start">--</span></div>
          <div><i class="fas fa-flag-checkered" style="width: 20px;"></i> <strong>Finished:</strong> <span id="nightly-finish">--</span></div>
        </div>

        <div id="nightly-stages" style="display: flex; flex-direction: column; gap: 12px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.05);">
          <!-- Dynamic stages injected here -->
        </div>
        <div id="nightlyRunBtnContainer"></div>
      </div>

      <!-- Card 2: Salmon Arm ETL -->
      <div class="card reveal reveal-delay-1" style="padding: 24px;">
        <div class="card-header" style="margin-bottom: 20px;">
          <div class="card-icon navy"><i class="fas fa-retweet"></i></div>
          <h4 style="font-size: 1.25rem;">Salmon Arm ETL Sync</h4>
        </div>
        
        <div id="etl-status-chip" style="display: inline-block; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; margin-bottom: 16px; background: rgba(148, 163, 184, 0.1); color: var(--text-secondary);">
          <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>

        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px;">
          <div><i class="fas fa-calendar-alt" style="width: 20px;"></i> <strong>Started:</strong> <span id="etl-start">--</span></div>
          <div><i class="fas fa-flag-checkered" style="width: 20px;"></i> <strong>Finished:</strong> <span id="etl-finish">--</span></div>
        </div>

        <div id="etl-stats" style="display: flex; flex-direction: column; gap: 12px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.05);">
          <!-- Dynamic stats injected here -->
        </div>
        <div id="etlRunBtnContainer"></div>
      </div>

    </div>
  </section>
</div>
